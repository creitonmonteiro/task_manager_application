name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: creitonmonteiro/task_manager_app
  K8S_NAMESPACE: task-manager
  K8S_DEPLOYMENT: task-manager-app
  K8S_CONTAINER: task-manager-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Python Install
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Poetry Install
        run: pipx install poetry

      - name: Dependencies Install
        run: poetry install

      - name: Run Tests
        run: poetry run task test --verbose --cov=task_manager --cov-report=xml

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Validate cluster connectivity
        run: |
          kubectl config current-context
          kubectl cluster-info
          kubectl get ns

      - name: Create app and database secrets
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          DATABASE_URL="postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-service:5432/${POSTGRES_DB}"
          kubectl -n task-manager create secret generic task-manager-secrets \
            --from-literal=DATABASE_URL="$DATABASE_URL" \
            --from-literal=SECRET_KEY="$SECRET_KEY" \
            --from-literal=ALGORITHM="$ALGORITHM" \
            --from-literal=ACCESS_TOKEN_EXPIRE_MINUTES="$ACCESS_TOKEN_EXPIRE_MINUTES" \
            --from-literal=POSTGRES_DB="$POSTGRES_DB" \
            --from-literal=POSTGRES_USER="$POSTGRES_USER" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply app manifests
        run: |
          kubectl apply -f k8s-namespace.yaml
          kubectl apply -f k8s-postgres.yaml
          kubectl apply -f k8s-app.yaml

      - name: Create Grafana secrets
        env:
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
        run: |
          if ! kubectl -n task-manager get secret grafana-secrets &>/dev/null; then
            GRAFANA_ADMIN_PASSWORD=$(openssl rand -base64 40 | tr -d '=+/\n' | head -c 32)
            kubectl -n task-manager create secret generic grafana-secrets \
              --from-literal=GRAFANA_ADMIN_USER="$GRAFANA_ADMIN_USER" \
              --from-literal=GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD"
            echo "::notice::grafana-secrets criado com senha gerada automaticamente (32 chars)."
          else
            echo "grafana-secrets já existe, mantendo senha atual."
          fi

      - name: Apply monitoring manifests
        run: |
          kubectl apply -f monitoring/

      - name: Deploy new image
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/"${{ env.K8S_DEPLOYMENT }}" \
            "${{ env.K8S_CONTAINER }}"="${{ env.IMAGE_NAME }}:${{ needs.build_and_push.outputs.image_tag }}"
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/"${{ env.K8S_DEPLOYMENT }}" --timeout=600s

      - name: Prepare and run k6 load test inside cluster
        run: |
          kubectl -n task-manager delete job k6-users-load --ignore-not-found=true
          kubectl -n task-manager delete pod k6-results-helper --ignore-not-found=true
          kubectl -n task-manager delete pod -l job-name=k6-users-load --ignore-not-found=true
          kubectl -n task-manager delete configmap k6-users-script --ignore-not-found=true

          if kubectl -n task-manager get pvc k6-results-pvc >/dev/null 2>&1; then
            deleting=$(kubectl -n task-manager get pvc k6-results-pvc -o jsonpath='{.metadata.deletionTimestamp}' 2>/dev/null || true)
            if [ -n "$deleting" ]; then
              echo "k6-results-pvc is terminating, forcing cleanup"
              kubectl -n task-manager patch pvc k6-results-pvc --type=merge -p '{"metadata":{"finalizers":[]}}' || true
              kubectl -n task-manager delete pvc k6-results-pvc --ignore-not-found=true || true
              kubectl -n task-manager wait --for=delete pvc/k6-results-pvc --timeout=180s || true
            fi
          fi

          kubectl -n task-manager create configmap k6-users-script \
            --from-file=users-create-get.js=loadtests/k6/users-create-get.js
          kubectl apply -f monitoring/k6-users-pvc.yaml
          kubectl apply -f monitoring/k6-users-job.yaml

          # Some storage classes use WaitForFirstConsumer and only bind after pod scheduling.
          kubectl -n task-manager wait --for=jsonpath='{.status.phase}'=Bound pvc/k6-results-pvc --timeout=300s || true
          pvc_phase=$(kubectl -n task-manager get pvc k6-results-pvc -o jsonpath='{.status.phase}' 2>/dev/null || true)
          if [ "$pvc_phase" != "Bound" ]; then
            echo "k6-results-pvc phase is $pvc_phase"
            kubectl -n task-manager describe pvc k6-results-pvc || true
          fi

          # Guard against short API timing gaps/race conditions.
          for i in {1..18}; do
            if kubectl -n task-manager get job k6-users-load >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          if ! kubectl -n task-manager get job k6-users-load >/dev/null 2>&1; then
            echo "k6 job not found after apply"
            kubectl -n task-manager get jobs
            exit 1
          fi

          for i in {1..90}; do
            complete=$(kubectl -n task-manager get job k6-users-load -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
            failed=$(kubectl -n task-manager get job k6-users-load -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || true)

            if ! kubectl -n task-manager get job k6-users-load >/dev/null 2>&1; then
              echo "k6 job disappeared while waiting"
              kubectl -n task-manager get jobs
              exit 1
            fi

            if [ "$complete" = "True" ]; then
              echo "k6 job completed successfully"
              break
            fi

            if [ "$failed" = "True" ]; then
              echo "k6 job failed"
              kubectl -n task-manager describe job k6-users-load
              kubectl -n task-manager get pods -l job-name=k6-users-load -o wide
              kubectl -n task-manager logs -l job-name=k6-users-load --tail=200 || true
              exit 1
            fi

            sleep 10
          done

          complete=$(kubectl -n task-manager get job k6-users-load -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || true)
          if [ "$complete" != "True" ]; then
            echo "k6 job did not complete within expected time"
            kubectl -n task-manager describe job k6-users-load
            kubectl -n task-manager get pods -l job-name=k6-users-load -o wide
            kubectl -n task-manager logs -l job-name=k6-users-load --tail=200 || true
            exit 1
          fi

      - name: Collect k6 results from PVC via helper pod
        run: |
          mkdir -p k6-results
          kubectl -n task-manager delete pod k6-results-helper --ignore-not-found=true
          # Create a helper pod that mounts the PVC and stays running for kubectl cp
          cat > /tmp/k6-helper-pod.yaml <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: k6-results-helper
            namespace: task-manager
          spec:
            containers:
            - name: helper
              image: busybox:1.36
              command:
              - /bin/sh
              - -c
              - sleep 300
              volumeMounts:
              - name: k6-results
                mountPath: /results
            volumes:
            - name: k6-results
              persistentVolumeClaim:
                claimName: k6-results-pvc
            restartPolicy: Never
          EOF
          
          kubectl apply -f /tmp/k6-helper-pod.yaml
          kubectl -n task-manager wait --for=condition=Ready pod/k6-results-helper --timeout=120s

          kubectl -n task-manager cp k6-results-helper:/results/summary.json k6-results/summary.json
          kubectl -n task-manager cp k6-results-helper:/results/k6.log k6-results/k6.log

          test -s k6-results/summary.json
          test -s k6-results/k6.log
          
          # Cleanup
          kubectl -n task-manager delete pod k6-results-helper --ignore-not-found=true

      - name: Convert k6 summary JSON to HTML
        run: |
          test -s k6-results/summary.json
          node <<'NODE'
          const fs = require('fs')

          const data = JSON.parse(fs.readFileSync('k6-results/summary.json', 'utf8'))

          const metrics = data.metrics || {}
            const checks = data.root_group?.checks || {}

          // Extract key metrics
            const httpReqs = metrics.http_reqs || {}
            const httpLatency = metrics.http_req_duration || {}
            const httpErrors = metrics.http_req_failed || {}

            function escapeHtml(value) {
              return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
            }

            const checksHtml = Object.keys(checks).length > 0
              ? `
                <div class="checks">
                  <h2>Checks</h2>
                  ${Object.entries(checks).map(([name, check]) => {
                    const passed = check.passes || 0
                    const failed = check.fails || 0
                    const total = passed + failed
                    const rate = total > 0 ? ((passed / total) * 100).toFixed(1) : '0.0'
                    const stateClass = failed === 0 ? 'check-pass' : 'check-fail'
                    const stateIcon = failed === 0 ? 'PASS' : 'FAIL'

                    return [
                      '<div class="check-item ' + stateClass + '">',
                      '  <span class="check-name">' + stateIcon + ' ' + escapeHtml(name) + '</span>',
                      '  <span class="check-rate">' + rate + '% (' + passed + '/' + total + ')</span>',
                      '</div>',
                    ].join('\n')
                  }).join('\n')}
                </div>`
              : ''

            const html = `<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>K6 Test Report</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
              .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              h1 { color: #333; margin-bottom: 10px; }
              .timestamp { color: #666; font-size: 14px; margin-bottom: 30px; }
              .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 30px 0; }
              .metric-card { background: #f9f9f9; padding: 20px; border-radius: 6px; border-left: 4px solid #0066cc; }
              .metric-label { color: #666; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
              .metric-value { font-size: 28px; font-weight: bold; color: #333; }
              .metric-unit { color: #999; font-size: 14px; margin-left: 8px; }
              .checks { margin-top: 30px; }
              .check-item { padding: 12px; margin: 10px 0; border-radius: 4px; border-left: 4px solid #ccc; }
              .check-pass { background: #f0f8f0; border-left-color: #28a745; }
              .check-fail { background: #f8f0f0; border-left-color: #dc3545; }
              .check-name { font-weight: bold; }
              .check-rate { float: right; color: #666; font-size: 12px; }
              table { width: 100%; border-collapse: collapse; margin-top: 30px; }
              th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
              td { padding: 12px; border-bottom: 1px solid #ddd; }
              tr:hover { background: #f9f9f9; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>K6 Load Test Report</h1>
              <div class="timestamp">Generated: ${new Date(data.state?.endTime || Date.now()).toLocaleString()}</div>

              <div class="metrics-grid">
                <div class="metric-card">
                  <div class="metric-label">Total Requests</div>
                  <div class="metric-value">${(httpReqs.count || 0).toLocaleString()}</div>
                </div>
                <div class="metric-card">
                  <div class="metric-label">Requests/sec</div>
                  <div class="metric-value">${(httpReqs.rate || 0).toFixed(2)}<span class="metric-unit">ops</span></div>
                </div>
                <div class="metric-card">
                  <div class="metric-label">Avg Latency</div>
                  <div class="metric-value">${(httpLatency.avg || 0).toFixed(0)}<span class="metric-unit">ms</span></div>
                </div>
                <div class="metric-card">
                  <div class="metric-label">Max Latency</div>
                  <div class="metric-value">${(httpLatency.max || 0).toFixed(0)}<span class="metric-unit">ms</span></div>
                </div>
                <div class="metric-card">
                  <div class="metric-label">P95 Latency</div>
                  <div class="metric-value">${(httpLatency['p(95)'] || 0).toFixed(0)}<span class="metric-unit">ms</span></div>
                </div>
                <div class="metric-card">
                  <div class="metric-label">Failed Requests</div>
                  <div class="metric-value">${(httpErrors.fails || 0).toLocaleString()}</div>
                </div>
              </div>

              ${checksHtml}
            </div>
          </body>
          </html>`

          fs.writeFileSync('k6-results/summary.html', html)
          console.log('HTML report generated: k6-results/summary.html')
          NODE
          test -s k6-results/summary.html

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k6-users-report-${{ github.run_id }}
          path: |
            k6-results/summary.json
            k6-results/summary.html
            k6-results/k6.log
          if-no-files-found: error