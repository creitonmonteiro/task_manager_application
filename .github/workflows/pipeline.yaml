name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: creitonmonteiro/task_manager_app
  K8S_NAMESPACE: task-manager
  K8S_DEPLOYMENT: task-manager-app
  K8S_CONTAINER: task-manager-app

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Python Install
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Poetry Install
        run: pipx install poetry

      - name: Dependencies Install
        run: poetry install

      - name: Run Tests
        run: poetry run task test --verbose --cov=task_manager --cov-report=xml

  build_and_push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: self-hosted
    needs: build_and_push
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Validate cluster connectivity
        run: |
          kubectl config current-context
          kubectl cluster-info
          kubectl get ns

      - name: Apply app manifests
        run: |
          kubectl apply -f k8s-namespace.yaml
          kubectl apply -f k8s-postgres.yaml
          kubectl apply -f k8s-app.yaml

      - name: Create Grafana secrets
        env:
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
        run: |
          if ! kubectl -n task-manager get secret grafana-secrets &>/dev/null; then
            GRAFANA_ADMIN_PASSWORD=$(openssl rand -base64 40 | tr -d '=+/\n' | head -c 32)
            kubectl -n task-manager create secret generic grafana-secrets \
              --from-literal=GRAFANA_ADMIN_USER="$GRAFANA_ADMIN_USER" \
              --from-literal=GRAFANA_ADMIN_PASSWORD="$GRAFANA_ADMIN_PASSWORD"
            echo "::notice::grafana-secrets criado com senha gerada automaticamente (32 chars)."
          else
            echo "grafana-secrets já existe, mantendo senha atual."
          fi

      - name: Apply monitoring manifests
        run: |
          kubectl apply -f monitoring/

      - name: Deploy new image
        run: |
          kubectl -n "${{ env.K8S_NAMESPACE }}" set image deployment/"${{ env.K8S_DEPLOYMENT }}" \
            "${{ env.K8S_CONTAINER }}"="${{ env.IMAGE_NAME }}:${{ needs.build_and_push.outputs.image_tag }}"
          kubectl -n "${{ env.K8S_NAMESPACE }}" rollout status deployment/"${{ env.K8S_DEPLOYMENT }}" --timeout=180s