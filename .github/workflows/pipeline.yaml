name: Pipeline
on: [push, pull_request]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Python Install
              uses: actions/setup-python@v6
              with:
                python-version: '3.14'

            - name: Poetry Install
              run: pipx install poetry

            - name: Dependencies Install
              run: poetry install

            - name: Run Tests
              run: poetry run task test --verbose --cov=fastapi_zero --cov-report=xml