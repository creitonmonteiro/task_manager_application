services:
  task_manager_database:
    image: postgres:16
    container_name: task_manager_database
    volumes:
      - db_data:/var/lib/postgresql/data/
    restart: unless-stopped
    ports:
      - "5433:5432"
    env_file:
      - .env.db
    networks:
      - task_manager_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  task_manager_app:
    image: task_manager
    container_name: task_manager
    entrypoint: ./entrypoint.sh
    build: .
    ports:
      - "8001:8000"
    restart: unless-stopped
    depends_on:
      task_manager_database:
        condition: service_healthy
    env_file:
      - .env
      - .env.db
    networks:
      - task_manager_network
volumes:
  db_data:

networks:
  task_manager_network:
    driver: bridge