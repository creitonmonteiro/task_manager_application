services:
  fastzero_database:
    image: postgres:16
    volumes:
      - db_data:/var/lib/postgresql/
    ports:
      - "5433:5432"
    env_file:
      - .env.db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  fastzero_app:
    image: fastapi_zero
    entrypoint: ./entrypoint.sh
    build: .
    ports:
      - "8001:8000"
    depends_on:
      fastzero_database:
        condition: service_healthy
    env_file:
      - .env
      - .env.db
    
volumes:
  db_data: